name: Build and upload Linux app artifact

on:
  workflow_dispatch:
    inputs:
      buildBranch:
        description: 'Headlamp ref/branch/tag'
        required: true
        default: 'main'

permissions:
  contents: read

jobs:
  build-linux:
    runs-on: ubuntu-latest
    permissions:
      actions: write # needed to upload artifacts
      contents: write
    steps:
    - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
      with:
        ref: ${{ github.event.inputs.buildBranch }}
    - name: Setup nodejs
      uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4.0.2
      with:
        node-version: 20.x
    - uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed # v5.1.0
      with:
        go-version: '1.24.*'
    - name: App linux
      run: |
        make app-linux
    - name: Rename AppImage 64bit version
      run: |
        FILE_PATH=$(echo app/dist/Headlamp*x86_64*.AppImage); mv ${FILE_PATH} $(echo ${FILE_PATH}|sed s/x86_64/x64/)
    - name: Upload Tarball artifacts
      continue-on-error: true
      uses: Anomalous-Ventures/devops/.github/actions/upload-s3@66345e915e2b88f14e9d1426ec37d7247c75921c # main
      with:
        name: Tarballs
        path: ./app/dist/Headlamp*.tar.*
        access-key: ${{ secrets.MINIO_ACCESS_KEY }}
        secret-key: ${{ secrets.MINIO_SECRET_KEY }}
    - name: Upload AppImage artifacts
      continue-on-error: true
      uses: Anomalous-Ventures/devops/.github/actions/upload-s3@66345e915e2b88f14e9d1426ec37d7247c75921c # main
      with:
        name: AppImages
        path: ./app/dist/Headlamp*.AppImage
        access-key: ${{ secrets.MINIO_ACCESS_KEY }}
        secret-key: ${{ secrets.MINIO_SECRET_KEY }}
    - name: Upload Debian artifacts
      continue-on-error: true
      uses: Anomalous-Ventures/devops/.github/actions/upload-s3@66345e915e2b88f14e9d1426ec37d7247c75921c # main
      with:
        name: Debian
        path: ./app/dist/headlamp*.deb
        access-key: ${{ secrets.MINIO_ACCESS_KEY }}
        secret-key: ${{ secrets.MINIO_SECRET_KEY }}
